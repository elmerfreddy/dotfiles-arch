; ============================================
; Redshift - Luz cálida nocturna
; Ubicación: La Paz, Bolivia (modo manual)
; Para otras ciudades, edita lat/lon en [manual]
; ============================================

[redshift]
; Temperatura de color diurna (luz neutra)
temp-day=6500
; Temperatura de color nocturna (luz cálida)
temp-night=4500
; Transición gradual al atardecer/amanecer
fade=1
; Corrección gamma (1.0 = sin corrección extra)
gamma=1.0
; Ubicación manual: ajusta lat/lon para tu ciudad
; Obtén tus coordenadas en: https://latlong.net
location-provider=manual
; Brillo (1.0 = sin cambio)
brightness-day=1.0
brightness-night=0.9

[manual]
lat=-16.5
lon=-68.15
